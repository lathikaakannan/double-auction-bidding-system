{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Farmer Notifications</title>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <link href="{% static 'style.css' %}" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { font-family: Arial; background-color: #f4f4f4; }
        .main { width: 1100px; margin: 0 auto; background: white; }
        .main_resize { padding: 20px; }
        .header { margin-bottom: 20px; }
        .logo h1 { color: #4CAF50; }
        .menu_nav { margin-bottom: 20px; }
        .menu_nav ul { list-style: none; padding: 0; margin: 0; display: flex; background-color: #4CAF50; border-radius: 5px; }
        .menu_nav ul li { display: inline-block; }
        .menu_nav ul li a { display: block; padding: 12px 20px; text-decoration: none; color: white; }
        .menu_nav ul li a:hover { background-color: #45a049; border-radius: 5px; }
        .hbg { margin-bottom: 20px; }
        .hbg img { width: 100%; height: auto; border-radius: 5px; }
        .container { padding: 20px; }
        .notifications-container { background: white; padding: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .unread { background-color: #e3f2fd !important; }
        .badge-danger { background-color: #dc3545; color: white; padding: 5px 10px; border-radius: 10px; }
        .list-group-item { margin-bottom: 10px; border-left: 4px solid #4CAF50; }
    </style>
</head>
<body>
<div class="main">
    <div class="main_resize">
        <div class="header">
            <div class="logo">
                <h1><span>Fresh Produce Purchase Supply Chains</span><small>Farmer Notifications</small></h1>
            </div>
        </div>
        <div class="content">
            <div class="content_bg">
                <div class="menu_nav">
                    <ul>
                        <li><a href="{% url 'FarmerDashboard' %}">Dashboard</a></li>
                        <li><a href="{% url 'AddProduct' %}">Add Product</a></li>
                        <li><a href="{% url 'MyProducts' %}">My Products</a></li>
                        <li><a href="{% url 'FarmerOrders' %}">Orders</a></li>
                        <li><a href="{% url 'PredictCropPrices' %}">Predict Prices</a></li>
                        <li><a href="{% url 'GetFarmerNotifications' %}" style="background-color: #45a049;">Notifications</a></li>
                        <li><a href="{% url 'FarmerLogin' %}" style="float:right;">Logout</a></li>
                    </ul>
                </div>
                <div class="hbg">
                    <img src="{% static 'images/header_images.jpg' %}" width="915" height="286" alt="" />
                </div>

                <div class="container">
                    {{ notifications|safe }}
                    
                    <div class="mt-4 text-center">
                        <a href="{% url 'FarmerDashboard' %}" class="btn btn-secondary">Back to Dashboard</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
    function markAsRead(notificationId) {
        $.ajax({
            url: '{% url "MarkNotificationAsRead" %}',
            type: 'POST',
            data: {
                notification_id: notificationId,
                csrfmiddlewaretoken: '{{ csrf_token }}'
            },
            success: function(response) {
                location.reload();
            }
        });
    }
</script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
