<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .navbar { background-color: #4CAF50; overflow: hidden; }
        .navbar a { float: left; display: block; color: white; text-align: center; padding: 14px 20px; text-decoration: none; }
        .navbar a:hover { background-color: #ddd; color: black; }
        .container { padding: 20px; }
        .table { background-color: white; }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="{% url 'CustomerDashboard' %}">Dashboard</a>
        <a href="{% url 'AvailableProducts' %}">Available Products</a>
        <a href="{% url 'MyOrders' %}" style="background-color: #45a049;">My Orders</a>
        <a href="{% url 'CustomerLogin' %}" style="float:right;">Logout</a>
    </div>

    <div class="container">
        <h2>My Orders</h2>
        
        {% if orders %}
            {{ orders|safe }}
        {% else %}
            <div class="alert alert-info">You haven't placed any orders yet. <a href="{% url 'AvailableProducts' %}">Browse Products</a></div>
        {% endif %}
        
        <div class="mt-3">
            <a href="{% url 'AvailableProducts' %}" class="btn btn-primary">Browse More Products</a>
            <a href="{% url 'CustomerDashboard' %}" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </div>

    <script>
        function cancelOrder(orderId) {
            if (confirm('Are you sure you want to cancel this order?')) {
                $.ajax({
                    url: '{% url "CancelOrder" %}',
                    type: 'POST',
                    data: {
                        order_id: orderId,
                        csrfmiddlewaretoken: '{{ csrf_token }}'
                    },
                    success: function(response) {
                        alert(response);
                        location.reload();
                    },
                    error: function(xhr, status, error) {
                        alert('Error: ' + error);
                    }
                });
            }
        }
    </script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
