<!DOCTYPE html>
<html>
<head>
    <title>My Products</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { font-family: Arial; background-color: #f4f4f4; }
        .navbar { background-color: #4CAF50; overflow: hidden; }
        .navbar a { float: left; display: block; color: white; text-align: center; padding: 14px 20px; text-decoration: none; }
        .navbar a:hover { background-color: #ddd; color: black; }
        .container { padding: 20px; }
        .table { background-color: white; }
        .badge-success { background-color: #28a745; color: white; padding: 5px 10px; border-radius: 3px; }
        .badge-secondary { background-color: #6c757d; color: white; padding: 5px 10px; border-radius: 3px; }
        h2 { color: #333; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="{% url 'FarmerDashboard' %}">Dashboard</a>
        <a href="{% url 'AddProduct' %}">Add Product</a>
        <a href="{% url 'MyProducts' %}" style="background-color: #45a049;">My Products</a>
        <a href="{% url 'FarmerOrders' %}">Orders</a>
        <a href="{% url 'PredictCropPrices' %}">Predict Prices</a>
        <a href="{% url 'FarmerLogin' %}" style="float:right;">Logout</a>
    </div>

    <div class="container">
        <h2>My Products</h2>
        
        {% if products %}
            {{ products|safe }}
        {% else %}
            <div class="alert alert-info">No products found. <a href="{% url 'AddProduct' %}">Add your first product</a></div>
        {% endif %}
        
        <div class="mt-3">
            <a href="{% url 'AddProduct' %}" class="btn btn-success">Add New Product</a>
            <a href="{% url 'FarmerDashboard' %}" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script>
        function updateStatus(productId, status) {
            if (confirm('Are you sure you want to remove this product?')) {
                $.ajax({
                    url: '{% url "UpdateProductStatus" %}',
                    type: 'POST',
                    data: {
                        product_id: productId,
                        status: status,
                        csrfmiddlewaretoken: '{{ csrf_token }}'
                    },
                    success: function(response) {
                        alert(response);
                        location.reload();
                    },
                    error: function(xhr, status, error) {
                        alert('Error: ' + error);
                    }
                });
            }
        }
    </script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
