<!DOCTYPE html>
<html>
<head>
    <title>Farmer Orders</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { font-family: Arial; background-color: #f4f4f4; }
        .navbar { background-color: #4CAF50; overflow: hidden; }
        .navbar a { float: left; display: block; color: white; text-align: center; padding: 14px 20px; text-decoration: none; }
        .navbar a:hover { background-color: #ddd; color: black; }
        .container { padding: 20px; }
        .table { background-color: white; }
        h2 { color: #333; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="{% url 'FarmerDashboard' %}">Dashboard</a>
        <a href="{% url 'AddProduct' %}">Add Product</a>
        <a href="{% url 'MyProducts' %}">My Products</a>
        <a href="{% url 'FarmerOrders' %}" style="background-color: #45a049;">Orders</a>
        <a href="{% url 'PredictCropPrices' %}">Predict Prices</a>
        <a href="{% url 'FarmerLogin' %}" style="float:right;">Logout</a>
    </div>

    <div class="container">
        <h2>Customer Orders</h2>
        
        {% if orders %}
            {{ orders|safe }}
        {% else %}
            <div class="alert alert-info">No orders found.</div>
        {% endif %}
        
        <div class="mt-3">
            <a href="{% url 'FarmerDashboard' %}" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script>
        function updateOrderStatus(orderId, status) {
            $.ajax({
                url: '{% url "UpdateOrderStatus" %}',
                type: 'POST',
                data: {
                    order_id: orderId,
                    status: status,
                    csrfmiddlewaretoken: '{{ csrf_token }}'
                },
                success: function(response) {
                    alert(response);
                },
                error: function(xhr, status, error) {
                    alert('Error: ' + error);
                }
            });
        }
        
        function cancelOrder(orderId) {
            if (confirm('Are you sure you want to cancel this order?')) {
                updateOrderStatus(orderId, 'cancelled');
                location.reload();
            }
        }
    </script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
